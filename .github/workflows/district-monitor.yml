name: District Ticket Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check Chandigarh match ticket status
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PAGE=$(curl -s "https://www.district.in/events/ipl-ticket-booking" \
            -H "User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)")

          for MATCH in "Punjab Kings vs Lucknow Super Giants" "Punjab Kings vs Rajasthan Royals"; do
            STATUS=$(echo "$PAGE" | grep -oP "${MATCH}.*?(?:Coming soon|Book|Tickets available|Sold out)" | head -1)

            if echo "$STATUS" | grep -qi "coming soon"; then
              echo "${MATCH}: Still Coming soon"
              continue
            fi

            if [ -n "$STATUS" ]; then
              curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                -d "text=${MATCH} (Chandigarh) ticket status CHANGED! Check: https://www.district.in/events/ipl-ticket-booking"
              echo "ALERT SENT: ${MATCH}"
            fi
          done
